[general]
bind_addr = "10.8.0.1:9847"
log_level = "info"
state_dir = "/var/lib/irongate"
snapshot_interval_secs = 30

[logs]
watch_files = [
  "/usr/local/lsws/logs/access.log",
  "/home/arsenalcraft.com.br/logs/*.access_log",
]

[detection]
window_seconds = 300
bucket_seconds = 10
block_threshold = 50
ban_escalation = [600, 1800, 3600, 10800, 21600, 86400]
strike_memory_hours = 24

[detection.rules]
ajax_flood = { enabled = true, threshold_ratio = 10.0, min_requests = 200, score = 40 }
page_flood = { enabled = true, threshold = 300, score = 35 }
login_brute = { enabled = true, threshold = 10, score = 50 }
cart_abuse = { enabled = true, threshold = 50, score = 45 }
checkout_spam = { enabled = true, threshold = 20, score = 60 }
scan_404 = { enabled = true, threshold = 50, score = 30 }
api_abuse = { enabled = true, threshold = 100, score = 35 }
empty_ua = { enabled = true, score = 15 }
static_flood = { enabled = true, threshold = 1000, score = 20 }

[enforcer]
htaccess_path = "/tmp/irongate_test_htaccess" # Para desenvolvimento local default
mode = "header"
header_name = "X-Forwarded-For"
cleanup_interval_secs = 60
flush_interval_secs = 10
dry_run = false
max_rules = 500
max_consecutive_failures = 3
backup_before_write = true
backup_dir = "/tmp/irongate_htaccess_backups" # Para desenvolvimento local default
backup_retention = 100

[enforcer.graceful_restart]
enabled = true
cmd = "/usr/local/lsws/bin/lswsctrl restart"
min_interval_secs = 30
max_pending_secs = 60
max_per_hour = 20

[whitelist]
ips = ["31.165.107.63"]
server_ips = ["24.152.39.104", "127.0.0.1", "::1"]
user_agents = ["ArsenalBot"]
search_engines = ["googlebot.com", "search.msn.com"]

[known_bots]
user_agents = [
  "zgrab", "censys", "nuclei", "nikto", "sqlmap",
  "AhrefsBot", "SemrushBot", "MJ12bot", "DotBot",
  "GPTBot", "CCBot", "Bytespider",
  "meta-externalads", "meta-externalagent",
  "Go-http-client", "python-requests", "scrapy",
]
