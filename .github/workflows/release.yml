name: Release Builder

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Rust Toolchain (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Compilar Binário Oficial (Release Performance)
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Preparar Artefato
        run: |
          mkdir -p release-pkg
          cp target/x86_64-unknown-linux-gnu/release/irongate release-pkg/
          cp config.toml release-pkg/ || true
          tar -czvf irongate-linux-x86_64.tar.gz -C release-pkg .

      - name: Gerar Tag Automática
        id: tag
        run: |
          TAG="v0.2.$(date +%Y%m%d%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git tag "$TAG"
          git push origin "$TAG"

      - name: Publicar GitHub Release Oficial
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: irongate-linux-x86_64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

