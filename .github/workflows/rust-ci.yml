name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Formatar Código (rustfmt)
      run: cargo fmt --all -- --check

    - name: Verificar Linting (Clippy)
      run: cargo clippy -- -D warnings

    - name: Bateria de Testes (Unit & Integration)
      run: cargo test --verbose

    - name: Compilar Verificação Final
      run: cargo build --release --verbose
